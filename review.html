<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Review Scheme of Work - Matrix TSL</title>
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Serif+4:opsz,wght@8..60,500;8..60,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="review.css">
</head>
<body class="review-body">
  <header class="review-header">
    <div>
      <a href="index.html" class="review-back">&larr; Back to Generator</a>
      <h1>Review and Edit Scheme</h1>
      <p class="review-copy">Edit the full document in a Word-style editor, then print or save the final document as PDF.</p>
    </div>
    <div class="review-actions">
      <button id="review-reset-btn" type="button">Reset Review Copy</button>
      <button id="review-print-btn" type="button">Print / Save PDF</button>
    </div>
  </header>

  <main class="review-layout">
    <section class="review-editor-panel">
      <div class="review-editor-head">
        <div>
          <p class="review-eyebrow">Editor</p>
          <h2 id="review-document-title">Loading...</h2>
        </div>
      </div>
      <textarea id="document-editor"></textarea>
    </section>

    <section class="review-preview-panel">
      <div class="review-editor-head">
        <div>
          <p class="review-eyebrow">Live Preview</p>
          <h2>Final Document</h2>
        </div>
      </div>
      <div id="review-preview" class="review-preview"></div>
    </section>
  </main>

  <div id="review-toast" class="toast" role="status" aria-live="polite"></div>

  <script src="node_modules/tinymce/tinymce.min.js"></script>
  <script src="review.js" type="module"></script>
</body>
</html>
